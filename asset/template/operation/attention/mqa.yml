kind: Operation
category: attention
op: attention.mqa
name: MQA
label: Multi-Query Attention
description: Multi-query attention — single KV head shared across all query heads.
initial_width: 280
inputs:
  - name: q
    type: tensor
    description: Query — [batch, num_heads, seq_len, head_dim]
  - name: k
    type: tensor
    description: Key — [batch, 1, seq_len, head_dim]
  - name: v
    type: tensor
    description: Value — [batch, 1, seq_len, head_dim]
outputs:
  - name: out
    type: tensor
    description: Attention output — [batch, num_heads, seq_len, head_dim]
