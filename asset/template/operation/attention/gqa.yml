kind: Operation
category: attention
op: attention.gqa
name: GQA
label: Grouped-Query Attention
description: Grouped-query attention — fewer KV heads than query heads (LLaMA 2 style).
initial_width: 280
inputs:
  - name: q
    type: tensor
    description: Query — [batch, num_q_heads, seq_len, head_dim]
  - name: k
    type: tensor
    description: Key — [batch, num_kv_heads, seq_len, head_dim]
  - name: v
    type: tensor
    description: Value — [batch, num_kv_heads, seq_len, head_dim]
outputs:
  - name: out
    type: tensor
    description: Attention output — [batch, num_q_heads, seq_len, head_dim]
config:
  - name: num_heads
    type: int
    description: Number of query heads
  - name: num_kv_heads
    type: int
    description: Number of key/value heads
  - name: head_dim
    type: int
    description: Per-head dimension
  - name: causal
    type: bool
    default: true
    description: Apply causal masking
bind:
  method: MultiHeadAttention
  config_struct: MultiHeadAttentionConfig
  config_fields:
    NumHeads:
      ref: config.num_heads.int
    HeadDim:
      ref: config.head_dim.int
    Causal:
      ref: config.causal.bool
    KVHeadCount:
      ref: config.num_kv_heads.int
  output:
    shape:
      - ref: input.q.shape
    dtype: input.q.dtype
  args:
    - ref: input.q.pointer
    - ref: input.k.pointer
    - ref: input.v.pointer
    - ref: output.out.pointer
    - ref: launch.N.int
    - ref: launch.KV.int
    - ref: input.q.dtype
