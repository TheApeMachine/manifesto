kind: Operation
category: convolution
op: convolution.conv2d
name: Conv2d
label: Conv 2D
description: 2-D convolution — [N, C_in, H, W] → [N, C_out, H_out, W_out].
initial_width: 220
inputs:
  - name: x
    type: tensor
    description: Input [N, in_channels, H, W]
outputs:
  - name: y
    type: tensor
    description: Output [N, out_channels, H_out, W_out]
config:
  - name: in_channels
    type: int
  - name: out_channels
    type: int
  - name: kernel_h
    type: int
  - name: kernel_w
    type: int
  - name: stride_h
    type: int
    default: 1
  - name: stride_w
    type: int
    default: 1
  - name: pad_h
    type: int
    default: 0
  - name: pad_w
    type: int
    default: 0
  - name: dil_h
    type: int
    default: 1
  - name: dil_w
    type: int
    default: 1
  - name: groups
    type: int
    default: 1
bind:
  method: Conv2D
  config_struct: Conv2DConfig
  config_fields:
    StrideH:
      ref: config.stride_h.int
    StrideW:
      ref: config.stride_w.int
    PaddingH:
      ref: config.pad_h.int
    PaddingW:
      ref: config.pad_w.int
    DilationH:
      ref: config.dil_h.int
    DilationW:
      ref: config.dil_w.int
  output:
    shape:
      - ref: input.x.shape
        dim: 0
      - ref: config.out_channels.int
      - ref: input.x.shape
        dim: 2
        conv2d_output: height
      - ref: input.x.shape
        dim: 3
        conv2d_output: width
    dtype: input.x.dtype
  args:
    - ref: input.x.pointer
    - ref: weight.pointer
    - ref: weight.bias.pointer
    - ref: output.y.pointer
    - ref: input.x.shape
      dim: 0
    - ref: input.x.shape
      dim: 1
    - ref: input.x.shape
      dim: 2
    - ref: input.x.shape
      dim: 3
    - ref: config.out_channels.int
    - ref: config.kernel_h.int
    - ref: config.kernel_w.int
    - ref: output.y.shape
      dim: 2
    - ref: output.y.shape
      dim: 3
    - ref: input.x.dtype
