kind: Operation
category: scheduler
op: scheduler.delta
name: SchedulerDelta
label: Scheduler Delta
description: Resolves the latent update delta for a scheduler timestep.
initial_width: 180
inputs:
  - name: timestep
    type: scalar
    description: Current scheduler timestep
  - name: step_index
    type: scalar
    description: Zero-based denoising loop index
outputs:
  - name: delta
    type: scalar
    description: Delta between the current and next scheduler sigma
