kind: Operation
category: state
op: state.page_gather
name: PageGather
label: Page Gather
description: Gathers a logical tensor view from generic paged tensor storage using manifest-provided page indices.
initial_width: 240
inputs:
  - name: storage
    type: tensor
    description: Paged tensor storage
  - name: page_ids
    type: tensor
    description: Page table entries identifying visible pages
outputs:
  - name: value
    type: tensor
    description: Logical gathered tensor view
config:
  - name: page_size
    type: int
    default: 16
    description: Number of logical rows per page
bind:
  method: state.page_gather
  output:
    shape:
      - ref: launch.KV.int
      - ref: input.storage.shape
        dim: -2
      - ref: input.storage.shape
        dim: -1
    dtype: input.storage.dtype
  args:
    - ref: input.storage
    - ref: input.page_ids
    - ref: config.page_size.int
