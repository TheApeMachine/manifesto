kind: Operation
category: state
op: state.page_write
name: PageWrite
label: Page Write
description: Writes tensor values into generic paged tensor storage at manifest-provided page positions.
initial_width: 240
inputs:
  - name: storage
    type: tensor
    description: Paged tensor storage
  - name: value
    type: tensor
    description: Values to write
  - name: page_ids
    type: tensor
    description: Page indices or page table entries identifying destination pages
  - name: offsets
    type: tensor
    description: Intra-page row offsets
outputs:
  - name: storage
    type: tensor
    description: Updated paged tensor storage
config:
  - name: page_size
    type: int
    default: 16
    description: Number of logical rows per page
bind:
  method: state.page_write
  output:
    shape:
      - ref: input.storage.shape
    dtype: input.storage.dtype
  args:
    - ref: input.storage
    - ref: input.value
    - ref: input.page_ids
    - ref: input.offsets
