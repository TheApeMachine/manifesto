kind: Operation
category: math
op: math.dropout
name: Dropout
label: Dropout
description: Randomly zeros elements during training with probability p.
initial_width: 200
inputs:
  - name: x
    type: tensor
    description: Input tensor
outputs:
  - name: y
    type: tensor
    description: Output with dropped elements
config:
  - name: p
    type: float
    default: 0.1
    description: Drop probability
  - name: training
    type: bool
    default: true
    description: If false, dropout is a no-op
