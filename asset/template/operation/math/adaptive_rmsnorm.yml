kind: Operation
category: math
op: math.adaptive_rmsnorm
name: AdaptiveRMSNorm
label: Adaptive RMS Norm
description: RMS normalizes over the last dimension and applies per-batch scale and shift modulation.
initial_width: 220
inputs:
  - name: x
    type: tensor
    description: Input tensor
  - name: modulation
    type: tensor
    description: Packed scale and shift modulation tensor
outputs:
  - name: y
    type: tensor
    description: Adaptively normalized output
config:
  - name: eps
    type: float
    default: 1e-6
    description: Numerical stability epsilon
bind:
  method: AdaptiveRMSNorm
  config_struct: RMSNormConfig
  config_fields:
    Epsilon:
      ref: config.eps.float
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: input.x.pointer
    - ref: input.modulation.pointer
    - ref: output.y.pointer
    - ref: input.x.shape
      drop_tail: 1
      product: true
    - ref: input.x.shape
      dim: -1
    - ref: input.x.shape
      drop_head: 1
      drop_tail: 1
      product: true
    - ref: input.modulation.shape
      dim: -1
    - ref: input.x.dtype
