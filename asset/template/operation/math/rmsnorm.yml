kind: Operation
category: math
op: math.rmsnorm
name: RMSNorm
label: RMS Norm
description: Root-mean-square normalization — simpler than LayerNorm, no mean subtraction.
initial_width: 200
inputs:
  - name: x
    type: tensor
    description: Input tensor
outputs:
  - name: y
    type: tensor
    description: Normalized output
config:
  - name: eps
    type: float
    default: 1e-6
    description: Numerical stability epsilon
bind:
  method: RMSNorm
  config_struct: RMSNormConfig
  config_fields:
    Epsilon:
      ref: config.eps.float
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: input.x.pointer
    - ref: weight.pointer
    - ref: output.y.pointer
    - ref: input.x.shape
      drop_tail: 1
      product: true
    - ref: input.x.shape
      dim: -1
    - ref: input.x.dtype
