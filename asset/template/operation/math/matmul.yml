kind: Operation
category: math
op: math.matmul
name: MatMul
label: Matrix Multiply
description: Matrix multiplication A[M,K] × B[K,N] → C[M,N].
initial_width: 200
inputs:
  - name: a
    type: tensor
    description: Left matrix [M, K]
  - name: b
    type: tensor
    description: Right matrix [K, N]
outputs:
  - name: c
    type: tensor
    description: Result matrix [M, N]
bind:
  method: Matmul
  output:
    shape:
      - ref: input.a.shape
        drop_tail: 1
      - ref: input.b.shape
        dim: -1
    dtype: input.a.dtype
  args:
    - ref: output.c.pointer
    - ref: input.a.pointer
    - ref: input.b.pointer
    - ref: input.a.shape
      drop_tail: 1
      product: true
    - ref: input.a.shape
      dim: -1
    - ref: input.b.shape
      dim: -1
    - ref: input.a.dtype
