kind: Operation
category: train
op: train.optimizer.adamax
name: AdaMax
label: AdaMax Optimizer
description: Adam variant using the infinity norm for the second moment.
initial_width: 260
config:
  - name: lr
    type: float
    description: "Learning rate (default: 0.002)"
  - name: beta1
    type: float
    description: "First moment decay (default: 0.9)"
  - name: beta2
    type: float
    description: "Infinity norm decay (default: 0.999)"
  - name: eps
    type: float
    description: "Numerical stability (default: 1e-8)"
inputs:
  - name: params
    type: tensor
    description: Current parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: params
    type: tensor
    description: Updated parameter vector
