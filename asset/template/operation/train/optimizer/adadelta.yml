kind: Operation
category: train
op: train.optimizer.adadelta
name: AdaDelta
label: AdaDelta Optimizer
description: Adaptive update method tracking squared gradients and squared parameter deltas.
initial_width: 260
config:
  - name: rho
    type: float
    description: "Decay factor (default: 0.9)"
  - name: eps
    type: float
    description: "Numerical stability (default: 1e-6)"
  - name: wd
    type: float
    description: "Weight decay (default: 0)"
inputs:
  - name: params
    type: tensor
    description: Current parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: params
    type: tensor
    description: Updated parameter vector
