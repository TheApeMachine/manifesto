kind: Operation
category: train
op: train.optimizer.adagrad
name: AdaGrad
label: AdaGrad Optimizer
description: Per-parameter adaptive learning rate from accumulated squared gradients.
initial_width: 260
config:
  - name: lr
    type: float
    description: "Learning rate (default: 0.01)"
  - name: eps
    type: float
    description: "Numerical stability (default: 1e-10)"
  - name: wd
    type: float
    description: "Weight decay (default: 0)"
  - name: lr_decay
    type: float
    description: "Learning-rate decay (default: 0)"
inputs:
  - name: params
    type: tensor
    description: Current parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: params
    type: tensor
    description: Updated parameter vector
