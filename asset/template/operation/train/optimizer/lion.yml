kind: Operation
category: train
op: train.optimizer.lion
name: Lion
label: Lion Optimizer
description: EvoLved Sign Momentum (Chen et al. 2023). Memory-efficient — uses only the sign of the update. Well-suited for large-scale training.
initial_width: 260
config:
  - name: lr
    type: float
    description: "Learning rate (default: 1e-4)"
  - name: beta1
    type: float
    description: "Momentum decay (default: 0.9)"
  - name: beta2
    type: float
    description: "Update EMA decay (default: 0.99)"
  - name: wd
    type: float
    description: "Weight decay (default: 0)"
inputs:
  - name: params
    type: tensor
    description: Current parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: params
    type: tensor
    description: Updated parameter vector
