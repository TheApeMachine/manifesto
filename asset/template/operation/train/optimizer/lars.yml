kind: Operation
category: train
op: train.optimizer.lars
name: LARS
label: LARS Optimizer
description: Layer-wise adaptive rate scaling for large-batch optimisation.
initial_width: 260
config:
  - name: lr
    type: float
    description: "Learning rate (default: 0.01)"
  - name: eta
    type: float
    description: "Trust coefficient (default: 0.001)"
  - name: momentum
    type: float
    description: "Momentum factor (default: 0.9)"
  - name: wd
    type: float
    description: "Weight decay (default: 0)"
  - name: eps
    type: float
    description: "Numerical stability (default: 1e-8)"
inputs:
  - name: params
    type: tensor
    description: Current parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: params
    type: tensor
    description: Updated parameter vector
