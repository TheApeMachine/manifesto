kind: Operation
category: positional
op: positional.rope
name: RoPE
label: Rotary Embeddings
description: Rotary Position Embeddings — encodes position by rotating Q/K vectors.
initial_width: 220
inputs:
  - name: x
    type: tensor
    description: Input [batch, num_heads, seq_len, head_dim]
  - name: position
    type: tensor
    description: Optional int32 sequence position offset supplied by the manifest
outputs:
  - name: y
    type: tensor
    description: Position-encoded output (same shape)
config:
  - name: head_dim
    type: int
    description: Head dimension (must be even)
  - name: base
    type: float
    default: 10000
    description: Frequency base
bind:
  method: RoPE
  config_struct: RoPEConfig
  config_fields:
    BaseFreq:
      ref: config.base.float
    StartPosition:
      ref: config.start_position.int
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: input.x.pointer
    - ref: output.y.pointer
    - ref: input.x.shape
      dim: 0
    - ref: input.x.shape
      dim: -2
    - ref: input.x.shape
      dim: -1
    - ref: input.x.dtype
  variants:
    - when:
        input_count: 2
      method: RoPE
      config_struct: RoPEConfig
      config_fields:
        BaseFreq:
          ref: config.base.float
      output:
        shape:
          - ref: input.x.shape
        dtype: input.x.dtype
      args:
        - ref: input.x.pointer
        - ref: output.y.pointer
        - ref: input.x.shape
          dim: 0
        - ref: input.x.shape
          dim: -2
        - ref: input.x.shape
          dim: -1
        - ref: input.x.dtype
