kind: Operation
category: positional
op: positional.rope
name: RoPE
label: Rotary Embeddings
description: Rotary Position Embeddings — encodes position by rotating Q/K vectors.
initial_width: 220
inputs:
  - name: x
    type: tensor
    description: Input [batch, num_heads, seq_len, head_dim]
  - name: position
    type: tensor
    description: Optional int32 sequence position offset supplied by the manifest
outputs:
  - name: y
    type: tensor
    description: Position-encoded output (same shape)
config:
  - name: head_dim
    type: int
    description: Head dimension (must be even)
  - name: base
    type: float
    default: 10000
    description: Frequency base
  - name: start_position
    type: int
    default: 0
    description: Absolute position offset for manifests without a position tensor
  - name: mode
    type: string
    default: interleaved
    description: "Pair layout: interleaved or half"
  - name: rope_type
    type: string
    default: none
    description: Frequency scaling rule
  - name: rope_factor
    type: float
    default: 1
    description: Frequency scaling factor
  - name: rope_low_freq_factor
    type: float
    default: 1
    description: Llama 3 low-frequency scaling boundary
  - name: rope_high_freq_factor
    type: float
    default: 4
    description: Llama 3 high-frequency scaling boundary
  - name: rope_original_context
    type: int
    default: 8192
    description: Original context length for scaled RoPE
bind:
  method: RoPE
  config_struct: RoPEConfig
  config_fields:
    BaseFreq:
      ref: config.base.float
    StartPosition:
      ref: config.start_position.int
    Mode:
      ref: config.mode.string
    Scaling:
      ref: config.rope_type.string
    ScalingFactor:
      ref: config.rope_factor.float
    LowFreqFactor:
      ref: config.rope_low_freq_factor.float
    HighFreqFactor:
      ref: config.rope_high_freq_factor.float
    OriginalContext:
      ref: config.rope_original_context.int
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: input.x.pointer
    - ref: output.y.pointer
    - ref: input.x.shape
      dim: 0
    - ref: input.x.shape
      dim: -2
    - ref: input.x.shape
      dim: -1
    - ref: input.x.dtype
  variants:
    - when:
        input_count: 2
      method: RoPE
      config_struct: RoPEConfig
      config_fields:
        BaseFreq:
          ref: config.base.float
        Mode:
          ref: config.mode.string
        Scaling:
          ref: config.rope_type.string
        ScalingFactor:
          ref: config.rope_factor.float
        LowFreqFactor:
          ref: config.rope_low_freq_factor.float
        HighFreqFactor:
          ref: config.rope_high_freq_factor.float
        OriginalContext:
          ref: config.rope_original_context.int
      output:
        shape:
          - ref: input.x.shape
        dtype: input.x.dtype
      args:
        - ref: input.x.pointer
        - ref: output.y.pointer
        - ref: input.x.shape
          dim: 0
        - ref: input.x.shape
          dim: -2
        - ref: input.x.shape
          dim: -1
        - ref: input.x.dtype
