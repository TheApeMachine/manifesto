kind: Operation
category: positional
op: positional.multi_axis_rope
name: MultiAxisRoPE
label: Multi-Axis Rotary Embeddings
description: Applies config-driven multi-axis rotary position embeddings over interleaved head pairs.
initial_width: 220
inputs:
  - name: x
    type: tensor
    description: Input [batch, sequence, num_heads, head_dim]
outputs:
  - name: y
    type: tensor
    description: Position-encoded output with the same shape
config:
  - name: head_dim
    type: int
    description: Head dimension
  - name: base
    type: float
    default: 10000
    description: Frequency base
  - name: latent_seq_len
    type: int
    description: Number of latent tokens at the end of the joint sequence
  - name: latent_side
    type: int
    description: Width and height of the latent token grid
  - name: axis_count
    type: int
    description: Number of RoPE coordinate axes
  - name: axis_dim_0
    type: int
    description: RoPE dimension count for axis 0
  - name: axis_dim_1
    type: int
    description: RoPE dimension count for axis 1
  - name: axis_dim_2
    type: int
    description: RoPE dimension count for axis 2
  - name: axis_dim_3
    type: int
    description: RoPE dimension count for axis 3
  - name: mode
    type: string
    default: interleaved
    description: Pair layout marker carried by FLUX manifests
bind:
  method: MultiAxisRoPE
  config_struct: MultiAxisRoPEConfig
  config_fields:
    BaseFreq:
      ref: config.base.float
    LatentSeqLen:
      ref: config.latent_seq_len.int
    LatentSide:
      ref: config.latent_side.int
    AxisCount:
      ref: config.axis_count.int
    AxisDim0:
      ref: config.axis_dim_0.int
    AxisDim1:
      ref: config.axis_dim_1.int
    AxisDim2:
      ref: config.axis_dim_2.int
    AxisDim3:
      ref: config.axis_dim_3.int
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: input.x.pointer
    - ref: output.y.pointer
    - ref: input.x.shape
      dim: 0
    - ref: input.x.shape
      dim: -3
    - ref: input.x.shape
      dim: -2
    - ref: input.x.shape
      dim: -1
    - ref: input.x.dtype
