kind: Operation
category: shape
op: shape.slice
name: Slice
label: Slice
description: |
  Extracts a contiguous [start:end) range along one row-major tensor dimension. The runtime dispatches this through a strided byte-copy intrinsic for host and device tensors.
initial_width: 220
inputs:
  - name: x
    type: tensor
    description: Input tensor
outputs:
  - name: y
    type: tensor
    description: Sliced tensor
config:
  - name: dim
    type: int
    default: 0
    description: Axis to slice along
  - name: start
    type: int
    default: 0
    description: Inclusive start index along dim
  - name: end
    type: int
    default: 0
    description: Exclusive end index along dim; zero means the full dim size
bind:
  method: shape.slice
  output:
    dtype: input.x.dtype
  args:
    - ref: input.x
    - ref: output.y.shape
