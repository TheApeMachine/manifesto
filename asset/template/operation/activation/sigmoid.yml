kind: Operation
category: activation
op: activation.sigmoid
name: Sigmoid
label: Sigmoid
description: Sigmoid squashing function, output in (0, 1).
initial_width: 180
inputs:
  - name: x
    type: tensor
    description: Input tensor
outputs:
  - name: y
    type: tensor
    description: Activated output
bind:
  method: Sigmoid
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: output.y.pointer
    - ref: input.x.pointer
    - ref: input.x.len
    - ref: input.x.dtype
