kind: Operation
category: activation
op: activation.gelu
name: GELU
label: GELU
description: Gaussian Error Linear Unit activation.
initial_width: 180
inputs:
  - name: x
    type: tensor
    description: Input tensor
outputs:
  - name: y
    type: tensor
    description: Activated output
bind:
  method: Gelu
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: output.y.pointer
    - ref: input.x.pointer
    - ref: input.x.len
    - ref: input.x.dtype
