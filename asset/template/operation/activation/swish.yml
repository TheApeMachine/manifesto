kind: Operation
category: activation
op: activation.swish
name: Swish
label: Swish
description: Swish activation — x * sigmoid(x).
initial_width: 180
inputs:
  - name: x
    type: tensor
    description: Input tensor
outputs:
  - name: y
    type: tensor
    description: Activated output
bind:
  method: Silu
  output:
    shape:
      - ref: input.x.shape
    dtype: input.x.dtype
  args:
    - ref: output.y.pointer
    - ref: input.x.pointer
    - ref: input.x.len
    - ref: input.x.dtype
