kind: Operation
category: bench
op: bench.metric.f1
name: F1
label: F1 Score
description: Accumulates binary classification TP/FP/FN and emits the running macro F1 score. Threshold is 0.5.
initial_width: 240
inputs:
  - name: predicted
    type: tensor
    description: Predicted probabilities (threshold 0.5)
  - name: targets
    type: tensor
    description: Binary ground-truth labels
outputs:
  - name: f1
    type: scalar
    description: Running F1 score
