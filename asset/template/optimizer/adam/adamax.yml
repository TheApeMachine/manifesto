kind: Optimizer
category: optimizer
op: optimizer.adamax
name: AdaMax
label: AdaMax
description: Adam variant using the infinity norm for the second moment — more stable for embeddings.
initial_width: 220
inputs:
  - name: params
    type: tensor
    description: Parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: updated
    type: tensor
    description: Updated parameter vector
config:
  - name: lr
    type: float
    default: 0.002
  - name: beta1
    type: float
    default: 0.9
  - name: beta2
    type: float
    default: 0.999
  - name: eps
    type: float
    default: 1e-8
