kind: Optimizer
category: optimizer
op: optimizer.adagrad
name: AdaGrad
label: AdaGrad
description: Adapts learning rate per-parameter based on accumulated squared gradients.
initial_width: 210
inputs:
  - name: params
    type: tensor
    description: Parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: updated
    type: tensor
    description: Updated parameter vector
config:
  - name: lr
    type: float
    default: 0.01
  - name: eps
    type: float
    default: 1e-8
  - name: lr_decay
    type: float
    default: 0.0
  - name: wd
    type: float
    default: 0.0
