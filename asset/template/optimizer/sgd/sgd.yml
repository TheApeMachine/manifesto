kind: Optimizer
category: optimizer
op: optimizer.sgd
name: SGD
label: SGD
description: Stochastic Gradient Descent with optional momentum and Nesterov correction.
initial_width: 200
inputs:
  - name: params
    type: tensor
    description: Parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: updated
    type: tensor
    description: Updated parameter vector
config:
  - name: lr
    type: float
    default: 0.01
  - name: momentum
    type: float
    default: 0.0
  - name: wd
    type: float
    default: 0.0
  - name: nesterov
    type: bool
    default: false
