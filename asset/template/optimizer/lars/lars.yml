kind: Optimizer
category: optimizer
op: optimizer.lars
name: LARS
label: LARS
description: Layer-wise Adaptive Rate Scaling — scales LR per layer by weight/gradient norms.
initial_width: 200
inputs:
  - name: params
    type: tensor
    description: Parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: updated
    type: tensor
    description: Updated parameter vector
config:
  - name: lr
    type: float
    default: 0.01
  - name: momentum
    type: float
    default: 0.9
  - name: wd
    type: float
    default: 0.0
  - name: eta
    type: float
    default: 0.001
  - name: eps
    type: float
    default: 1e-8
