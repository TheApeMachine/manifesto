kind: Optimizer
category: optimizer
op: optimizer.lamb
name: LAMB
label: LAMB
description: Layer-wise Adaptive Moments — LARS with Adam moments, for large-batch training.
initial_width: 210
inputs:
  - name: params
    type: tensor
    description: Parameter vector
  - name: grads
    type: tensor
    description: Gradient vector
outputs:
  - name: updated
    type: tensor
    description: Updated parameter vector
config:
  - name: lr
    type: float
    default: 0.001
  - name: beta1
    type: float
    default: 0.9
  - name: beta2
    type: float
    default: 0.999
  - name: eps
    type: float
    default: 1e-6
  - name: wd
    type: float
    default: 0.0
