kind: Block
category: model
op: block.model.llama_3_2_1b_instruct
name: Llama 3.2 1B Instruct
label: Llama 3.2 1B Instruct
description: Meta's Llama 3.2 1B Instruct architecture (16 layers
              - GQA
              - RoPE
              - SwiGLU).
inputs:
  - name: input_ids
    type: tensor
    description: Input token IDs [batch
              - seq_len
outputs:
  - name: logits
    type: tensor
    description: Output logits [batch
              - seq_len
              - vocab_size

system:
  runtime:
    type: model
    backend: metal
    model:
      source: meta-llama/Llama-3.2-1B-Instruct
      repo_type: model
    tokenizer:
      source: meta-llama/Llama-3.2-1B-Instruct
      repo_type: model
    generation:
      max_new_tokens: 256
      repetition_penalty: 1.1
      temperature: 0.8
      top_k: 50
      top_p: 0.95
      seed: 0
      prompt_template: |+
        <|begin_of_text|><|start_header_id|>system<|end_header_id|>

        Cutting Knowledge Date: December 2023
        Today Date: 26 Jul 2024

        <|eot_id|><|start_header_id|>user<|end_header_id|>

        {{prompt}}<|eot_id|><|start_header_id|>assistant<|end_header_id|>

      stop_tokens: []
      stop_special_tokens: true

  topology:
    nodes:
      - id: embed_tokens
        op: embedding.token
        in:
              - input_ids
        out:
              - h_0
        config:
          vocab_size: 128256
          d_model: 2048

      - id: transformer_layers
        op: control.repeat
        in:
          - h_0
        out:
          - h_16
        repeat: 16
        index: i
        template:
          - id: input_layernorm_${i}
            op: math.rmsnorm
            in:
              - h_${i}
            out:
              - norm1_${i}
            config:
              eps: 1e-05

          - id: q_proj_${i}
            op: projection.linear
            in:
              - norm1_${i}
            out:
              - q_proj_${i}
            config:
              in_features: 2048
              out_features: 2048

          - id: k_proj_${i}
            op: projection.linear
            in:
              - norm1_${i}
            out:
              - k_proj_${i}
            config:
              in_features: 2048
              out_features: 512

          - id: v_proj_${i}
            op: projection.linear
            in:
              - norm1_${i}
            out:
              - v_proj_${i}
            config:
              in_features: 2048
              out_features: 512

          - id: q_heads_${i}
            op: shape.view_as_heads
            in:
              - q_proj_${i}
            out:
              - q_heads_${i}
            config:
              num_heads: 32

          - id: k_heads_${i}
            op: shape.view_as_heads
            in:
              - k_proj_${i}
            out:
              - k_heads_${i}
            config:
              num_heads: 8

          - id: v_heads_${i}
            op: shape.view_as_heads
            in:
              - v_proj_${i}
            out:
              - v_heads_${i}
            config:
              num_heads: 8

          - id: rope_q_${i}
            op: positional.rope
            in:
              - q_heads_${i}
            out:
              - q_rope_${i}
            config:
              base: 500000.0
              head_dim: 64
              mode: half
              rope_type: llama3
              rope_factor: 32.0
              rope_low_freq_factor: 1.0
              rope_high_freq_factor: 4.0
              rope_original_context: 8192

          - id: rope_k_${i}
            op: positional.rope
            in:
              - k_heads_${i}
            out:
              - k_rope_${i}
            config:
              base: 500000.0
              head_dim: 64
              mode: half
              rope_type: llama3
              rope_factor: 32.0
              rope_low_freq_factor: 1.0
              rope_high_freq_factor: 4.0
              rope_original_context: 8192

          - id: attn_${i}
            op: attention.gqa
            in:
              - q_rope_${i}
              - k_rope_${i}
              - v_heads_${i}
            out:
              - attn_heads_${i}
            config:
              num_heads: 32
              num_kv_heads: 8
              head_dim: 64
              causal: true

          - id: merge_attention_${i}
            op: shape.merge_heads
            in:
              - attn_heads_${i}
            out:
              - attn_out_${i}

          - id: o_proj_${i}
            op: projection.linear
            in:
              - attn_out_${i}
            out:
              - o_proj_${i}
            config:
              in_features: 2048
              out_features: 2048

          - id: add_1_${i}
            op: math.add
            in:
              - h_${i}
              - o_proj_${i}
            out:
              - h_mid_${i}

          - id: post_attention_layernorm_${i}
            op: math.rmsnorm
            in:
              - h_mid_${i}
            out:
              - norm2_${i}
            config:
              eps: 1e-05

          - id: gate_up_proj_${i}
            op: projection.linear
            in:
              - norm2_${i}
            out:
              - gate_up_proj_${i}
            config:
              in_features: 2048
              out_features: 16384

          - id: swiglu_${i}
            op: activation.swiglu
            in:
              - gate_up_proj_${i}
            out:
              - swiglu_out_${i}

          - id: down_proj_${i}
            op: projection.linear
            in:
              - swiglu_out_${i}
            out:
              - down_proj_${i}
            config:
              in_features: 8192
              out_features: 2048

          - id: add_2_${i}
            op: math.add
            in:
              - h_mid_${i}
              - down_proj_${i}
            out:
              - h_${next_i}

      - id: norm
        op: math.rmsnorm
        in:
              - h_16
        out:
              - final_norm
        config:
          eps: 1e-05

      - id: lm_head
        op: projection.linear
        in:
              - final_norm
        out:
              - logits
        config:
          in_features: 2048
          out_features: 128256
