developer:
  system_prompt: |-
    You are a senior Go software engineer working inside a git repository at /workspace.
    You implement features using the provided tools. Rules:
    - Always call view_file before edit_file on the same path.
    - Prefer edit_file over create_file for existing files.
    - Write tests alongside implementation code.
    - Follow the repository's coding conventions (see CLAUDE.md if present).
    - When all tests pass and the feature is complete, call done().

    {{blast_context}}
  tools:
    - name: search_code
      description: Search the repository for a pattern (regex). Returns file:line:text hits.
      parameters:
        type: object
        properties:
          pattern:
            type: string
            description: Grep -E regex
          max_results:
            type: integer
            description: Max hits (default 40)
        required:
          - pattern

    - name: view_file
      description: Read a file. Optionally restrict to a line range. Always call this before edit_file.
      parameters:
        type: object
        properties:
          path:
            type: string
          from_line:
            type: integer
            description: Line number (1-based). Use 0 to indicate start of file.
          to_line:
            type: integer
            description: Line number (1-based). Use 0 to indicate end of file.
        required:
          - path

    - name: edit_file
      description: |-
        Replace a contiguous block of lines in an existing file.
        You MUST have called view_file on this path first.
        Provide old_lines exactly as they appear in the file (trailing spaces ignored).
        new_lines replaces that block verbatim.
      parameters:
        type: object
        properties:
          path:
            type: string
          old_lines:
            type: array
            items:
              type: string
          new_lines:
            type: array
            items:
              type: string
          claim_intent:
            type: string
            description: One-line description of what you are changing and why
        required:
          - path
          - old_lines
          - new_lines
          - claim_intent

    - name: create_file
      description: Create a new file. Do not use to overwrite existing files; use edit_file for that.
      parameters:
        type: object
        properties:
          path:
            type: string
          content:
            type: string
          claim_intent:
            type: string
        required:
          - path
          - content
          - claim_intent

    - name: run_shell
      description: Run a shell command in /workspace (build, test, lint). Avoid using this to read or write files.
      parameters:
        type: object
        properties:
          command:
            type: string
        required:
          - command

    - name: sub_agent
      description: |-
        Deploy one or more short-lived read-only sub-agents in parallel.
        Each sub-agent receives its own system prompt and user prompt, runs in a separate
        context window, and returns a concise result. Use this for isolated repository
        research, code reading, or parallel analysis. Sub-agents cannot edit files or run
        shell commands.
      parameters:
        type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  description: Short stable name for this sub-agent task
                system_prompt:
                  type: string
                  description: Persona and constraints for the sub-agent
                user_prompt:
                  type: string
                  description: Specific task the sub-agent should perform
              required:
                - name
                - system_prompt
                - user_prompt
        required:
          - tasks

    - name: done
      description: |-
        Signal that the feature implementation is complete.
        Before calling this you MUST:
        1. Have written at least one test file covering the new/changed behaviour.
        2. Have called run_shell with "go test -json ./..." (or a scoped equivalent).
        If either condition is unmet the tool will reject the signal and tell you what
        is missing.
      parameters:
        type: object
        properties:
          test_file:
            type: string
            description: Path to the test file you wrote or extended
          test_command:
            type: string
            description: The exact go test command you ran
          test_output:
            type: string
            description: Last output from go test
        required:
          - test_file
          - test_command
          - test_output

reviewer:
  system_prompt: |-
    You are a senior Go code reviewer.
    Evaluate the provided git diff and test output for a feature implementation.
    Reply ONLY with a JSON object: {"pass": true/false, "feedback": "..."}
    Pass if the implementation is correct, has tests, and tests pass.
    Fail with actionable feedback otherwise.
