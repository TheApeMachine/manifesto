kind: program
name: diffusion-diagnose
category: runtime

include:
  flux2klein: model.diffusion.flux-2-klein-4b

state:
  - name: latents
    type: tensor
    init: runtime
    config:
      dtype: bf16
  - name: prompt_embeds
    type: tensor
    shape: [1, 1024, 7680]
    config:
      dtype: bf16

schedulers:
  scheduler:
    type: flux2klein.system.runtime.scheduler.type
    config:
      steps: flux2klein.system.runtime.scheduler.num_inference_steps
      num_train_timesteps: flux2klein.system.runtime.scheduler.num_train_timesteps
      shift: flux2klein.system.runtime.scheduler.shift
      use_dynamic_shifting: flux2klein.system.runtime.scheduler.use_dynamic_shifting
      time_shift_type: flux2klein.system.runtime.scheduler.time_shift_type

main:
  - op: diffusion.prepare_latents
    config:
      width: flux2klein.system.runtime.generation.width
      height: flux2klein.system.runtime.generation.height
      seed: flux2klein.system.runtime.generation.seed
      latent_downsample: flux2klein.system.runtime.generation.latent_downsample
      latent_channels: flux2klein.system.runtime.generation.latent_channels
      dtype: bf16
      scheduler: scheduler
    out:
      latents: state.latents

  - in: prompt
    op: tokenizer.encode
    config:
      tokenizer: flux2klein.system.runtime.tokenizer.source
      tokenizer_file: flux2klein.system.runtime.tokenizer.file
      apply_chat_template: true
      max_length: 1024
      pad_token_id: 151643
    out: input_ids

  - in:
      input_ids: input_ids
    op: graph.call
    graph: flux2klein.text_encoder
    out:
      prompt_embeds: state.prompt_embeds

  - op: scheduler.timesteps
    config:
      scheduler: scheduler
    out: timesteps
