kind: program
name: chat
category: runtime

include:
  model: hf://meta-llama/Llama-3.2-1B-Instruct#paged_decode

state:
  - name: key_pages
    type: paged_tensor
    shape: [16, 4096, 16, 8, 64]
    config:
      page_size: 16
      page_count: 4096
  - name: value_pages
    type: paged_tensor
    shape: [16, 4096, 16, 8, 64]
    config:
      page_size: 16
      page_count: 4096
  - name: key_page_table
    type: page_table
    config:
      capacity: 4096
  - name: value_page_table
    type: page_table
    config:
      capacity: 4096
  - name: position_offset
    type: tensor
    shape: [1]
    config:
      dtype: int32
  - name: write_page_ids
    type: tensor
    shape: [1]
    config:
      dtype: int32
  - name: write_offsets
    type: tensor
    shape: [1]
    config:
      dtype: int32

main:
  - repeat: until_eof
    steps:
      - in: <stdin>
        op: io.read_line
        out: user_text

      - in: user_text
        op: tokenizer.encode
        config:
          tokenizer: hf://meta-llama/Llama-3.2-1B-Instruct
          apply_chat_template: true
          append_to: input_ids
        out: input_ids

      - in:
          token_ids: input_ids
          position_offset: state.position_offset
        op: state.paged_plan
        config:
          page_size: 16
        out:
          - state.write_page_ids
          - state.write_offsets
          - state.key_page_table
          - state.value_page_table

      - in:
          input_ids: input_ids
          position_offset: state.position_offset
          key_pages: state.key_pages
          value_pages: state.value_pages
          key_page_table: state.key_page_table
          value_page_table: state.value_page_table
          write_page_ids: state.write_page_ids
          write_offsets: state.write_offsets
        op: graph.call
        graph: model
        out:
          logits: logits
          key_pages: state.key_pages
          value_pages: state.value_pages

      - in: logits
        op: sampling.topk_sample
        config:
          vocab_size: 128256
          temperature: 0.8
          top_k: 50
          stop_token_ids:
            - 128001
            - 128008
            - 128009
        out: next_token

      - in: next_token
        op: io.emit_token
        config:
          tokenizer: hf://meta-llama/Llama-3.2-1B-Instruct
        out: _

      - in:
          token_ids: input_ids
          position_offset: state.position_offset
        op: state.advance_position
        out:
          - state.position_offset

      - repeat: 255
        steps:
          - in:
              token_ids: next_token
              position_offset: state.position_offset
            op: state.paged_plan
            config:
              page_size: 16
            out:
              - state.write_page_ids
              - state.write_offsets
              - state.key_page_table
              - state.value_page_table

          - in:
              input_ids: next_token
              position_offset: state.position_offset
              key_pages: state.key_pages
              value_pages: state.value_pages
              key_page_table: state.key_page_table
              value_page_table: state.value_page_table
              write_page_ids: state.write_page_ids
              write_offsets: state.write_offsets
            op: graph.call
            graph: model
            out:
              logits: logits
              key_pages: state.key_pages
              value_pages: state.value_pages

          - in: logits
            op: sampling.topk_sample
            config:
              vocab_size: 128256
              temperature: 0.8
              top_k: 50
              stop_token_ids:
                - 128001
                - 128008
                - 128009
            out: next_token

          - in: next_token
            op: io.emit_token
            config:
              tokenizer: hf://meta-llama/Llama-3.2-1B-Instruct
            out: _

          - in:
              token_ids: next_token
              position_offset: state.position_offset
            op: state.advance_position
            out:
              - state.position_offset
