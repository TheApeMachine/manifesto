kind: program
name: chat
category: runtime

include:
  model: hf://meta-llama/Llama-3.2-1B-Instruct

main:
  # Session: keep reading until stdin closes or user exits
  - repeat: until_eof
    steps:
      - in: <stdin>
        op: io.read_line
        out: user_text

      - in: user_text
        op: tokenizer.encode
        config:
          tokenizer: hf://meta-llama/Llama-3.2-1B-Instruct
          apply_chat_template: true
        out: input_ids

      # Decode loop — all atomics / graph.call, no sampler object
      - repeat: 256
        steps:
          - in:
              input_ids: input_ids
            op: graph.call
            graph: model
            out:
              logits: logits

          - in: logits
            op: sampling.topk_sample
            config:
              vocab_size: 128256
              temperature: 0.8
              top_k: 50
              top_p: 0.95
            out: next_token

          - in: next_token
            op: io.emit_token
            config:
              tokenizer: hf://meta-llama/Llama-3.2-1B-Instruct
            out: _

          - in: next_token
            op: value.append
            config:
              target: input_ids
            out: input_ids