kind: program
name: diffusion
category: runtime

variables:
  width: 256
  height: 256
  seed: 1337
  output: flux-2-klein-4b.png
  num_inference_steps: 4
  max_sequence_length: 512

include:
  flux2klein: hf://black-forest-labs/FLUX.2-klein-4B

state:
  - name: latents
    type: tensor
    init: runtime
  - name: step_index
    type: counter
  - name: prompt_embeds
    type: tensor
    init: runtime

main:
  - op: diffusion.prepare_latents
    config:
      width: ${width}
      height: ${height}
      seed: ${seed}
      latent_downsample: flux2klein.system.components.vae.latent_downsample
      latent_channels: flux2klein.system.components.transformer.config.in_channels
    out:
      latents: state.latents
      latent_ids: state.latent_ids

  - in: prompt
    op: tokenizer.encode
    config:
      tokenizer: flux2klein.system.pipeline.source
      tokenizer_file: tokenizer/tokenizer.json
      apply_chat_template: true
      max_length: ${max_sequence_length}
      pad_token_id: flux2klein.system.components.tokenizer.pad_token_id
    out: input_ids

  - in:
      input_ids: input_ids
    op: graph.call
    graph: flux2klein.text_encoder
    out:
      prompt_embeds: state.prompt_embeds

  - op: scheduler.timesteps
    out: timesteps

  - op: control.loop_each
    source: timesteps
    as: timestep
    steps:
      - in:
          hidden_states: state.latents
          encoder_hidden_states: state.prompt_embeds
          timestep: timestep
        op: graph.call
        graph: flux2klein.transformer
        out:
          sample: velocity

      - in:
          step_index: state.step_index
        op: scheduler.delta
        out: delta

      - in:
          y: state.latents
          x: velocity
          alpha: delta
        op: math.axpy
        out:
          y: state.latents

      - op: state.update
        config:
          update: increment
          target: state.step_index

  - in:
      latents: state.latents
    op: graph.call
    graph: flux2klein.vae
    out:
      image: image

  - in:
      image: image
    op: io.write_image
    config:
      path: ${output}
      width: ${width}
      height: ${height}
      channels: 3
      layout: channel_planar
      range: neg_one_one
